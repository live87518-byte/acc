<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NƠI TÌNH YÊU BẮT ĐẦU</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
    color:#fff;
}

header{
    text-align:center;
    padding:50px 20px;
}

header h1{
    font-size:45px;
    margin-bottom:10px;
    text-shadow:0 0 20px #00e5ff;
}

header p{
    color:#cbd5e1;
    font-size:18px;
}

.packages{
    width:90%;
    max-width:1300px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:35px;
    padding-bottom:60px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:25px;
    overflow:hidden;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.card:hover{
    transform:translateY(-15px);
    box-shadow:0 25px 50px rgba(0,229,255,.25);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:25px;
}

.info h2{
    margin-bottom:10px;
    font-size:28px;
}

.info p{
    color:#cbd5e1;
    margin-bottom:20px;
}

.badge{
    display:inline-block;
    background:#00e5ff;
    color:#000;
    padding:8px 18px;
    border-radius:30px;
    font-weight:bold;
}

.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

.box{
    width:400px;
    background:#111827;
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,229,255,.25);
    animation:show .3s;
}

@keyframes show{
    from{
        transform:scale(.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.box h2{
    margin-bottom:25px;
}

.box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:#fff;
    font-size:16px;
    outline:none;
}

.box button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#00e5ff;
    color:#000;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.box button:hover{
    transform:scale(1.05);
}

.close{
    margin-top:15px;
    color:#94a3b8;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
    <h1>YÊU ANH KHÔNG VỢ</h1>
    <p>ANH YÊU CÁC VỢ NHẮM 🫦.</p>

<header>
    <p> yeeu em vi ci eo </p>
</header>
</body>
</html>
